version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: finance-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret}
    networks:
      - finance-network

  backend:
    build: ./backend
    container_name: finance-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-secret}@mongodb:27017/finance-tracker?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      AI_SERVICE_URL: http://ai-service:5001
    depends_on:
      - mongodb
      - ai-service
    networks:
      - finance-network

  frontend:
    build: ./frontend
    container_name: finance-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - finance-network

  ai-service:
    build: ./ai
    container_name: finance-ai
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
    networks:
      - finance-network

  nginx:
    image: nginx:alpine
    container_name: finance-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - finance-network

volumes:
  mongodb_data:

networks:
  finance-network:
    driver: bridge
